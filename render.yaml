services:
  - type: web
    name: edgerift
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://edgerift.vercel.app
    healthCheckPath: /api/me
